apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

namePrefix: prod-

labels:
  - pairs:
      environment: production
    includeSelectors: true

resources:
  - ../../base

patches:
  - path: patch-app-replicas.yaml
  - path: patch-db-resources.yaml
  - path: patch-ingress-host.yaml
