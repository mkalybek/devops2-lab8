app:
  name: nginx-app
  replicaCount: 1
  image:
    repository: nginx
    tag: latest
  port: 80
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  env:
    DB_HOST: "postgres"
    DB_PORT: "5432"
    DB_USER: "admin"
    DB_PASSWORD: "secret"
    DB_NAME: "appdb"

db:
  name: postgres
  replicaCount: 1
  image:
    repository: postgres
    tag: "16"
  port: 5432
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  env:
    POSTGRES_USER: "admin"
    POSTGRES_PASSWORD: "secret"
    POSTGRES_DB: "appdb"

networkPolicy:
  enabled: true

rbac:
  enabled: true

serviceAccount:
  create: true
