# -- Default values for the app subchart
replicaCount: 1

image:
  repository: nginx
  tag: latest
  pullPolicy: IfNotPresent

port: 80

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"

service:
  type: ClusterIP

ingress:
  enabled: true
  host: myapp.local
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

rbac:
  enabled: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "services"]
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources: ["configmaps"]
      verbs: ["get", "list"]

networkPolicy:
  enabled: true
