# -- Parent chart values that get passed down to subcharts

db:
  # -- Enable or disable the database subchart
  enabled: true
  # -- Number of database replicas
  replicaCount: 1
  image:
    # -- Database image repository
    repository: postgres
    # -- Database image tag
    tag: "16"
    # -- Image pull policy
    pullPolicy: IfNotPresent
  # -- Database port
  port: 5432
  # -- Database credentials and configuration. When existingSecret is set,
  # credentials are loaded via envFrom from that Secret (e.g. produced by
  # Sealed Secrets / ESO) instead of the inline username/password/database.
  auth:
    existingSecret: "postgres-credentials"
    username: "admin"
    password: "secret"
    database: "appdb"
  # -- Resource requests and limits for the database
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  # -- Service configuration
  service:
    type: ClusterIP
  # -- RBAC configuration
  rbac:
    enabled: true
    rules:
      - apiGroups: [""]
        resources: ["pods"]
        verbs: ["get", "list", "watch"]
      - apiGroups: [""]
        resources: ["persistentvolumeclaims"]
        verbs: ["get", "list"]
  # -- Network policy configuration
  networkPolicy:
    enabled: true

app:
  # -- Enable or disable the app subchart
  enabled: true
  # -- Number of app replicas
  replicaCount: 1
  image:
    # -- App image repository
    repository: nginx
    # -- App image tag
    tag: latest
    # -- Image pull policy
    pullPolicy: IfNotPresent
  # -- App container port
  port: 80
  # -- Resource requests and limits for the app
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  # -- Service configuration
  service:
    type: ClusterIP
  # -- Ingress configuration
  ingress:
    enabled: true
    host: myapp.local
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
  # -- RBAC configuration
  rbac:
    enabled: true
    rules:
      - apiGroups: [""]
        resources: ["pods", "services"]
        verbs: ["get", "list", "watch"]
      - apiGroups: [""]
        resources: ["configmaps"]
        verbs: ["get", "list"]
  # -- Network policy configuration
  networkPolicy:
    enabled: true
